<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

<form>

    <h2>Create your account</h2>
    <p>Join us in a couple of steps.</p>
    <hr>

    <div class="fullname-box">
        <label for="fullname">Full Name</label><br>
        <input type="text" id="fullname">
    </div>
    <br>

    <div class="age-box">
        <label for="age">Age</label><br>
        <input type="number" id="age">
    </div>
    <br>

    <div class="dob-box">
        <label for="dob">Date of Birth</label><br>
        <input type="date" id="dob">
    </div>
    <br>

    <div class="email-box">
        <label for="email">Email Address</label><br>
        <input type="email" id="email">
    </div>
    <br>

    <div class="password-box">
        <label for="password">Password</label><br>
        <input type="password" id="password">
    </div>
    <br>

    <div class="contact-box">
    <label>Preferred Contact</label><br><br>

    <input type="radio" id="emailcontact" name="contact">
    <label for="emailcontact">Email</label>

    <input type="radio" id="phonecontact" name="contact">
    <label for="phonecontact">Phone</label>

    <input type="radio" id="smscontact" name="contact">
    <label for="smscontact">SMS</label>
</div>
    <br>

    <div class="button-box">
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </div>

</form>

</body>
</html>
